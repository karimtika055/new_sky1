<!DOCTYPE html>
<html lang="ar" dir="rtl">

     <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>معرض الأعمال المنظم</title>
          <style>
               /* 1. التنسيقات العامة */
               body {
                    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                    background-color: #f4f7f6;
                    margin: 0;
                    padding: 0;
               }

               .container {
                    max-width: 1100px;
                    margin: 50px auto;
                    padding: 20px;
               }

               /* 2. عنوان القسم */
               .section-header {
                    text-align: center;
                    margin-bottom: 40px;
               }

               .section-header h2 {
                    color: #2c3e50;
                    font-size: 32px;
                    position: relative;
                    display: inline-block;
                    padding-bottom: 10px;
               }

               .section-header h2::after {
                    content: '';
                    position: absolute;
                    bottom: 0;
                    left: 50%;
                    transform: translateX(-50%);
                    width: 80px;
                    height: 4px;
                    background-color: #12bd6d;
                    /* لونك الأخضر المميز */
                    border-radius: 2px;
               }

               /* 3. حاوية السلايدر (Slider Wrapper) */
               .slider-wrapper {
                    width: 100%;
                    overflow: hidden;
                    border-radius: 25px;
                    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
                    background-color: #fff;
                    position: relative;
               }

               /* شريط الصور المتحرك */
               .main-slider {
                    display: flex;
                    width: 300%;
                    /* عدد الصور (3) × 100% */
                    animation: slide-animation 15s infinite ease-in-out;
               }

               /* كارت الصورة الواحدة */
               .slide-card {
                    width: 100%;
                    position: relative;
               }

               .slide-card img {
                    width: 100%;
                    height: 500px;
                    object-fit: cover;
                    /* لضمان جودة الصورة وعدم تمددها */
                    display: block;
               }

               /* الطبقة الشفافة فوق الصورة (Overlay) */
               .overlay {
                    position: absolute;
                    bottom: 0;
                    right: 0;
                    left: 0;
                    background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
                    padding: 40px;
                    color: white;
                    text-align: right;
               }

               .overlay h3 {
                    margin: 0 0 10px;
                    font-size: 24px;
                    color: #12bd6d;
               }

               .overlay p {
                    margin: 0;
                    font-size: 16px;
                    opacity: 0.9;
               }

               /* 4. حركة السلايدر (Animation) */
               /* ملاحظة: الحركات بالـ RTL قد تحتاج ضبطاً حسب اتجاه الشاشة */
               @keyframes slide-animation {

                    0%,
                    28% {
                         transform: translateX(0);
                    }

                    33%,
                    61% {
                         transform: translateX(33.33%);
                    }

                    66%,
                    94% {
                         transform: translateX(66.66%);
                    }

                    100% {
                         transform: translateX(0);
                    }
               }

               /* 5. زر العودة للخلف (إضافي) */
               .back-home {
                    display: block;
                    width: fit-content;
                    margin: 30px auto;
                    padding: 12px 30px;
                    background-color: #12bd6d;
                    color: white;
                    text-decoration: none;
                    border-radius: 50px;
                    font-weight: bold;
                    transition: 0.3s;
               }

               .back-home:hover {
                    background-color: #0ea35d;
                    transform: translateY(-3px);
                    box-shadow: 0 5px 15px rgba(18, 189, 109, 0.4);
               }

               /* 6. التجاوب مع الشاشات الصغيرة */
               @media (max-width: 768px) {
                    .slide-card img {
                         height: 300px;
                    }

                    .overlay h3 {
                         font-size: 18px;
                    }

                    .overlay p {
                         font-size: 14px;
                    }
               }
          </style>
     </head>

     <body>

          <div class="container">

               <div class="section-header">
                    <h2>معرض المشاريع المميزة</h2>
               </div>

               <div class="slider-wrapper">
                    <div class="main-slider">

                         <div class="slide-card">
                              <img src="image/New_sky.png" alt="مشروع 1">
                              <div class="overlay">
                                   <h3>مشروع التطوير البرمجي</h3>
                                   <p>هذا النص يصف المشروع الأول ويوضح أهم المميزات التي تم العمل عليها.</p>
                              </div>
                         </div>

                         <div class="slide-card">
                              <img src="image/New_sky.png" alt="مشروع 2">
                              <div class="overlay">
                                   <h3>تصميم واجهات المستخدم</h3>
                                   <p>هنا تظهر تفاصيل المشروع الثاني بأسلوب منظم وجذاب للعين.</p>
                              </div>
                         </div>

                         <div class="slide-card">
                              <img src="image/New_sky.png" alt="مشروع 3">
                              <div class="overlay">
                                   <h3>حلول تقنية متكاملة</h3>
                                   <p>وصف المشروع الثالث الذي يعكس الخبرة والجودة في التنفيذ.</p>
                              </div>
                         </div>

                    </div>
               </div>

               <a href="index.html" class="back-home">العودة للرئيسية</a>

          </div>

     </body>

</html>
