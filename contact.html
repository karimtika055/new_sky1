<!DOCTYPE html>
<html lang="ar" dir="rtl">

     <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>تواصل معي | Contact Me</title>
          <style>
               /* إعدادات عامة */
               * {
                    margin: 0;
                    padding: 0;
                    box-sizing: border-box;
                    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
               }

               body {
                    background: #f0f2f5;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    min-height: 100vh;
                    padding: 20px;
               }

               /* حاوية الصفحة */
               .contact-wrapper {
                    width: 100%;
                    max-width: 1100px;
                    background: #fff;
                    display: grid;
                    grid-template-columns: 40% 60%;
                    border-radius: 20px;
                    overflow: hidden;
                    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
               }

               /* الجزء الجانبي (معلومات التواصل) */
               .contact-sidebar {
                    background: #1a1a2e;
                    color: #fff;
                    padding: 40px;
                    display: flex;
                    flex-direction: column;
                    justify-content: space-between;
               }

               .contact-sidebar h2 {
                    color: #4db8ff;
                    font-size: 2rem;
                    margin-bottom: 20px;
               }

               .contact-sidebar p {
                    line-height: 1.6;
                    color: #ccc;
                    margin-bottom: 30px;
               }

               .info-details div {
                    display: flex;
                    align-items: center;
                    margin-bottom: 25px;
               }

               .info-details span {
                    font-size: 1.5rem;
                    margin-left: 15px;
                    color: #4db8ff;
               }

               .social-media {
                    display: flex;
                    gap: 15px;
               }

               .social-media a {
                    color: #fff;
                    text-decoration: none;
                    background: rgba(255, 255, 255, 0.1);
                    padding: 10px 20px;
                    border-radius: 8px;
                    font-size: 0.9rem;
                    transition: 0.3s;
               }

               .social-media a:hover {
                    background: #4db8ff;
                    color: #1a1a2e;
               }

               /* جزء الفورم */
               .contact-main {
                    padding: 50px;
                    background: #fff;
               }

               .form-group {
                    margin-bottom: 20px;
               }

               .form-group label {
                    display: block;
                    margin-bottom: 8px;
                    font-weight: 600;
                    color: #333;
               }

               .form-group input,
               .form-group textarea {
                    width: 100%;
                    padding: 15px;
                    border: 2px solid #e1e1e1;
                    border-radius: 10px;
                    outline: none;
                    font-size: 1rem;
                    transition: 0.3s;
               }

               .form-group input:focus,
               .form-group textarea:focus {
                    border-color: #4db8ff;
               }

               .submit-btn {
                    background: #1a1a2e;
                    color: #fff;
                    padding: 15px 40px;
                    border: none;
                    border-radius: 10px;
                    font-size: 1.1rem;
                    font-weight: bold;
                    cursor: pointer;
                    transition: 0.3s;
                    width: 100%;
               }

               .submit-btn:hover {
                    background: #4db8ff;
                    transform: translateY(-3px);
                    box-shadow: 0 5px 15px rgba(77, 184, 255, 0.4);
               }

               /* توافق الشاشات (Responsive) */
               @media (max-width: 850px) {
                    .contact-wrapper {
                         grid-template-columns: 1fr;
                    }

                    .contact-sidebar {
                         padding: 30px;
                    }
               }
          </style>
     </head>

     <body>

          <div class="contact-wrapper">
               <!-- معلومات التواصل -->
               <div class="contact-sidebar">
                    <div>
                         <h2>لنعمل معاً</h2>
                         <p>سواء كنت ترغب في بناء تطبيق جديد، أو لديك استفسار برمجى، لا تتردد في مراسلتي.</p>

                         <div class="info-details">
                              <div>
                                   <span>📍</span>
                                   <p>القاهرة، مصر</p>
                              </div>
                              <div>
                                   <span>✉️</span>
                                   <p>karimtika055@gmail.com</p>
                              </div>
                         </div>
                    </div>

                    <div class="social-media">
                         <a href="#">LinkedIn</a>
                         <a href="#">GitHub</a>
                    </div>
               </div>

               <!-- نموذج الإرسال -->
               <div class="contact-main">
                    <form action="#">
                         <div class="form-group">
                              <label>الاسم الكامل</label>
                              <input type="text" placeholder="ادخل اسمك هنا" required>
                         </div>

                         <div class="form-group">
                              <label>البريد الإلكتروني</label>
                              <input type="email" placeholder="example@mail.com" required>
                         </div>

                         <div class="form-group">
                              <label>الموضوع</label>
                              <input type="text" placeholder="عن ماذا تريد التحدث؟">
                         </div>

                         <div class="form-group">
                              <label>الرسالة</label>
                              <textarea rows="4" placeholder="اكتب تفاصيل طلبك هنا..." required></textarea>
                         </div>

                         <button type="submit" class="submit-btn">إرسال الآن</button>
                    </form>
               </div>
          </div>

     </body>

</html>
